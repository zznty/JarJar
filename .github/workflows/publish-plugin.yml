name: Publish JarJar Plugin

on:
  workflow_dispatch:
  push:
    branches: [ 'main' ]
    paths:
      - 'jarjar-gradle/**'
      - '!.github/workflows/**'
      - '!docs/**'
      - '!README.md'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          # gitversion derives the version from tags + commit offset, so we need full history + tags.
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Publishes the plugin + its plugin marker (net.zznty.jarjar) to maven.zznty.ru. We don't push to the
      # Gradle Plugin Portal, so `publishPlugins` is intentionally omitted.
      - name: Build and publish
        run: ./gradlew :jarjar-gradle:check :jarjar-gradle:publish --no-configuration-cache
        env:
          MAVEN_USER: ${{ secrets.MAVEN_USER }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
